name: Build Catalog

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build catalog
        run: python scripts/build_catalog.py catalog.json.z

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: catalog-${{ github.run_number }}
          name: Catalog ${{ github.run_number }}
          body: "Automated weekly catalog update"
          files: catalog.json.z
          make_latest: true
